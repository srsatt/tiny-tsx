name: alpha release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alpha-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Install Linux native prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libcurl4-openssl-dev
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Install example dependencies
        run: npm ci --prefix examples
      - name: Verify native alpha archive
        run: npm run release:verify
      - name: Check artifact target
        shell: bash
        run: |
          base="dist/release/tinytsx-0.1.0-alpha.1-${{ matrix.target }}"
          test -f "$base.tar.gz"
          jq -e --arg target "${{ matrix.target }}" --arg commit "$GITHUB_SHA" '
            .schemaVersion == 2 and
            .version == "0.1.0-alpha.1" and
            .target == $target and
            .source.commit == $commit and
            .source.dirty == false
          ' "$base.manifest.json"
      - uses: actions/upload-artifact@v4
        with:
          name: tinytsx-0.1.0-alpha.1-${{ matrix.target }}
          path: |
            dist/release/tinytsx-0.1.0-alpha.1-${{ matrix.target }}.tar.gz
            dist/release/tinytsx-0.1.0-alpha.1-${{ matrix.target }}.tar.gz.sha256
            dist/release/tinytsx-0.1.0-alpha.1-${{ matrix.target }}.manifest.json
          if-no-files-found: error
